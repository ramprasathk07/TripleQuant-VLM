# ── Model ──────────────────────────────────────────────────────────────────
model:
  model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
  torch_dtype: "bfloat16"
  device_map: "auto"
  trust_remote_code: true
  min_pixels: 100352
  max_pixels: 200704

# ── Quantization Method ─────────────────────────────────────────────────────
quantization:
  method: "gptq"
  num_bits: 8
  group_size: 128
  symmetric: true
  targets: ["Linear"]
  ignore:
    - "re:.*embed_tokens"
    - "re:.*norm$"
    - "re:model[.]visual.*"
    - "lm_head"
  gptq:
    block_size: 128
    dampening_frac: 0.01
    sequential_update: true
    smoothquant_enabled: true
    smoothquant_strength: 0.5

# ── Calibration ─────────────────────────────────────────────────────────────
calibration:
  dataset_id: "nielsr/funsd"
  dataset_split: "train"
  num_samples: 64
  max_seq_length: 512
  batch_size: 1

# ── Output ──────────────────────────────────────────────────────────────────
output:
  base_dir: "outputs"
  save_compressed: true
  save_dir_suffix: "-GPTQ-W8A16"
